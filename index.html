<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador LIAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-6">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-2xl border-t-8 border-blue-900">
        <h1 class="text-2xl font-black text-blue-900 mb-6 uppercase text-center">Configurador de Recursos</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">NIVEL DE RESULTADO</label>
                <select id="logro" class="w-full p-3 bg-slate-50 border rounded-lg font-bold">
                    <option value="destacado">🌟 DESTACADO (Retos)</option>
                    <option value="esperado">✅ ESPERADO (Refuerzo)</option>
                    <option value="descendido">🆘 DESCENDIDO (Nivelación)</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">TIPO DE RECURSO</label>
                <select id="tipo" class="w-full p-3 bg-slate-50 border rounded-lg font-bold">
                    <option value="juego">🎮 JUEGO PSICOMOTRIZ</option>
                    <option value="ficha">📄 FICHA IMPRESA</option>
                </select>
            </div>

            <button onclick="irAlRecurso()" class="w-full bg-teal-500 hover:bg-blue-900 text-white font-bold py-4 rounded-xl transition-all shadow-lg uppercase mt-4">
                Generar y Abrir Recurso →
            </button>
        </div>
    </div>

    <script>
        function irAlRecurso() {
            const logro = document.getElementById('logro').value;
            const tipo = document.getElementById('tipo').value;
            // Esto envía las opciones por la URL
            window.location.href = `recurso.html?logro=${logro}&tipo=${tipo}`;
        }
    </script>
</body>
</html>
