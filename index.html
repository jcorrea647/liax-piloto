<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIAX - Plataforma de Autoría Pedagógica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #e5e7eb; position: sticky; top: 0; height: 100vh; }
        .card-recurso { background: white; border-radius: 2.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.08); overflow: hidden; }
        .badge-apoyo { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .draggable { touch-action: none; user-select: none; cursor: grab; }
        .dropzone-active { background: #d1fae5 !important; border-color: #10b981 !important; }
        @media print { .no-print { display: none !important; } .sidebar { display: none; } body { background: white; } }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar p-6 flex flex-col gap-6 no-print overflow-y-auto">
        <div class="flex items-center gap-2 mb-4">
            <div class="bg-blue-900 text-white px-3 py-1 rounded font-black italic">LIAX</div>
            <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold uppercase">PRO v2.5</span>
        </div>
        <div>
            <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">📊 Resumen INDI</h3>
            <div class="space-y-2 text-[11px]">
                <div class="p-2.5 rounded-xl bg-yellow-50 text-yellow-800 border border-yellow-200 flex justify-between items-center"><span>🌟 Destacado</span> <strong>15</strong></div>
                <div class="p-2.5 rounded-xl bg-green-50 text-green-800 border border-green-200 flex justify-between items-center"><span>✅ Esperado</span> <strong>7</strong></div>
                <div class="p-2.5 rounded-xl badge-apoyo flex justify-between items-center font-bold"><span>⚠️ Apoyo</span> <strong>7</strong></div>
            </div>
        </div>
        <div class="text-[11px] space-y-3 border-t pt-5">
             <p><strong>Aula:</strong> Rayitos A (5 años)</p>
             <p><strong>Área:</strong> Comunicación</p>
             <p class="text-slate-500 italic leading-snug">Contexto: Piura (Chilalo, Algarrobo)</p>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <header class="flex justify-between items-center mb-10 no-print bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-200">
            <div class="text-slate-500 text-sm">📄 Visualizador — <strong class="text-blue-900">RAYITOS A • Comunicación</strong></div>
            <div class="flex gap-4">
                <div class="relative group">
                    <button class="bg-blue-900 text-white px-6 py-2.5 rounded-xl text-xs font-black flex items-center gap-2 shadow-lg">
                        🎨 ELIGE EL RECURSO <span class="text-[8px] opacity-60">▼</span>
                    </button>
                    <div class="absolute right-0 mt-3 w-64 bg-white border border-slate-200 rounded-2xl shadow-2xl hidden group-hover:block z-50 overflow-hidden ring-4 ring-black/5">
                        <div class="p-3 bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b">Acción Digital</div>
                        <button onclick="cargarRimas()" class="w-full text-left p-4 text-xs hover:bg-teal-50 flex items-center gap-3 transition-colors">
                            <span class="text-lg">🎤</span> <strong>Rimas de Piura</strong>
                        </button>
                        <button onclick="cargarPuzzle()" class="w-full text-left p-4 text-xs hover:bg-indigo-50 flex items-center gap-3 border-b transition-colors">
                            <span class="text-lg">🧩</span> <strong>Puzzle Lógico</strong>
                        </button>
                        <div class="p-3 bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b">Imprimible</div>
                        <button onclick="cargarFicha()" class="w-full text-left p-4 text-xs hover:bg-rose-50 flex items-center gap-3 transition-colors">
                            <span class="text-lg">📄</span> <strong>Ficha Zona de Apoyo</strong>
                        </button>
                    </div>
                </div>
                <button onclick="window.print()" class="bg-slate-200 text-slate-700 px-6 py-2.5 rounded-xl text-xs font-black hover:bg-slate-300">🖨️ IMPRIMIR</button>
            </div>
        </header>

        <div id="contenedor-recurso" class="mx-auto max-w-4xl">
            <div class="bg-white rounded-[3rem] p-24 text-center border-4 border-dashed border-slate-100">
                <p class="text-slate-400 font-bold italic">Selecciona un recurso para activarlo...</p>
            </div>
        </div>
    </main>

    <script>
        const contenedor = document.getElementById('contenedor-recurso');

        // --- FUNCION 1: FICHA IMPRIMIBLE ---
        function cargarFicha() {
            contenedor.innerHTML = `
                <div class="card-recurso border border-slate-200 bg-white">
                    <div class="bg-blue-700 p-8 text-white flex justify-between items-center">
                        <div><h2 class="text-3xl font-black uppercase italic">Ficha Pedagógica</h2><p class="text-[11px] opacity-80 uppercase font-bold tracking-widest">Comunicación - Nivel Apoyo</p></div>
                        <span class="text-5xl">🎨</span>
                    </div>
                    <div class="grid grid-cols-4 text-[10px] border-b uppercase font-bold bg-slate-50 p-4">
                        <div>Aula: <span class="text-blue-700">Rayitos A</span></div>
                        <div>Maestra: <span class="text-blue-700">Fanny De la Cruz</span></div>
                        <div>Fecha: <span class="text-blue-700">30/04/2026</span></div>
                        <div>INDI: <span class="text-rose-600 font-black italic">Zona de Apoyo</span></div>
                    </div>
                    <div class="p-10">
                        <div class="bg-rose-50 border border-rose-200 rounded-[2rem] p-8 mb-6">
                            <h4 class="text-rose-700 font-black text-xs mb-4 uppercase">⚠️ Alumnos Seleccionados (INDI):</h4>
                            <div class="flex flex-wrap gap-2 mb-6">
                                ${["Caleb López", "Yocelin Ogoña", "Thiago Pangalima", "David Coral"].map(n => `<span class="bg-white border px-3 py-1 rounded-lg text-[10px] font-bold text-rose-600">${n}</span>`).join('')}
                            </div>
                            <div class="grid grid-cols-2 gap-8 items-center">
                                <div>
                                    <p class="text-lg font-bold text-slate-800 italic">"El Chilalo de Piura canta así:"</p>
                                    <p class="text-3xl font-black text-rose-600 tracking-widest mt-2 uppercase">chi-LA-lo</p>
                                </div>
                                <div class="text-8xl text-center">🐦</div>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        // --- FUNCION 2: RÍMAS INTERACTIVAS ---
        function cargarRimas() {
            contenedor.innerHTML = `
                <div class="card-recurso border-4 border-teal-500 rounded-[3rem] bg-white overflow-hidden">
                    <div class="bg-teal-600 p-6 text-white text-center"><h2 class="text-2xl font-black uppercase italic tracking-tighter">Laboratorio de Rimas Piuranas</h2></div>
                    <div class="p-12 text-center">
                        <p class="text-slate-400 font-black mb-6 uppercase text-xs">¿Qué rima con MANGO?</p>
                        <div class="text-9xl mb-8">🥭</div>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="alert('¡Excelente! Mango rima con Fandango.')" class="p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl text-xl font-bold hover:bg-teal-500 hover:text-white transition-all">💃 Fandango</button>
                            <button onclick="alert('Inténtalo de nuevo')" class="p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl text-xl font-bold hover:bg-rose-500 hover:text-white transition-all">🚗 Carro</button>
                        </div>
                    </div>
                </div>`;
        }

        // --- FUNCION 3: PUZZLE INTERACTIVO ---
        function cargarPuzzle() {
            contenedor.innerHTML = `
                <div class="card-recurso border-4 border-indigo-600 rounded-[3rem] bg-white overflow-hidden">
                    <div class="bg-indigo-700 p-6 text-white text-center"><h2 class="text-2xl font-black uppercase italic tracking-tighter">Puzzle de Encastre Lógico</h2></div>
                    <div class="p-12 flex flex-col items-center">
                        <div id="dropzone" class="w-64 h-64 border-4 border-dashed border-slate-200 rounded-[3rem] flex items-center justify-center text-slate-100 text-9xl mb-12 transition-all">⭐</div>
                        <div id="drag-piece" class="draggable w-32 h-32 bg-white shadow-2xl rounded-3xl border border-slate-100 flex items-center justify-center text-6xl">⭐</div>
                        <p class="mt-8 text-xs font-bold text-slate-400 italic">ARRASTRA LA ESTRELLA AL MOLDE</p>
                    </div>
                </div>`;
            
            // Iniciar lógica de arrastre
            initInteract();
        }

        function initInteract() {
            interact('.draggable').draggable({
                listeners: {
                    move (event) {
                        const { target } = event;
                        const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                        const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                    }
                }
            });

            interact('#dropzone').dropzone({
                accept: '#drag-piece',
                overlap: 0.5,
                ondragenter: (e) => e.target.classList.add('dropzone-active'),
                ondragleave: (e) => e.target.classList.remove('dropzone-active'),
                ondrop: (e) => {
                    alert('¡Reto Logrado! Pieza encajada correctamente.');
                    e.relatedTarget.style.opacity = '0';
                    document.getElementById('dropzone').innerText = '⭐';
                    document.getElementById('dropzone').classList.add('text-yellow-400', 'opacity-100');
                }
            });
        }
    </script>
</body>
</html>
