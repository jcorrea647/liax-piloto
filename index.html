<header class="flex justify-between items-center mb-6 no-print bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
    <div class="text-slate-500 text-sm italic">
        📄 Recurso — <strong>RAYITOS A • Comunicación</strong>
    </div>

    <div class="flex gap-4">
        <div class="relative group">
            <button class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 transition-all">
                🎮 TIPO DE RECURSO <span class="text-[8px]">▼</span>
            </button>
            
            <div class="absolute right-0 mt-2 w-56 bg-white border border-slate-200 rounded-2xl shadow-xl hidden group-hover:block z-50 overflow-hidden">
                <div class="p-2 bg-slate-50 text-[9px] font-bold text-slate-400 uppercase border-b">Digital / Juego</div>
                <button onclick="poblarRecurso('juego-rimas')" class="w-full text-left p-3 text-xs hover:bg-teal-50 flex items-center gap-2">
                    <span>🎤</span> Rimas Interactivas (Piura)
                </button>
                <button onclick="poblarRecurso('juego-puzzle')" class="w-full text-left p-3 text-xs hover:bg-teal-50 flex items-center gap-2 border-b">
                    <span>🧩</span> Puzzle de Rotación Lógica
                </button>
                
                <div class="p-2 bg-slate-50 text-[9px] font-bold text-slate-400 uppercase border-b">Imprimible / Ficha</div>
                <button onclick="poblarRecurso('ficha-trazo')" class="w-full text-left p-3 text-xs hover:bg-orange-50 flex items-center gap-2">
                    <span>✏️</span> Ficha de Grafomotricidad
                </button>
                <button onclick="poblarRecurso('ficha-comprension')" class="w-full text-left p-3 text-xs hover:bg-orange-50 flex items-center gap-2">
                    <span>📖</span> Comprensión de Textos
                </button>
            </div>
        </div>

        <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-xs font-black shadow-lg hover:bg-blue-700 transition-all">
            🖨️ IMPRIMIR
        </button>
    </div>
</header>

<div id="contenedor-recurso" class="card-recurso mx-auto max-w-4xl border border-slate-200 overflow-hidden">
    <div class="p-20 text-center text-slate-300 font-bold italic">
        Selecciona un tipo de recurso para comenzar...
    </div>
</div>

<script>
    function poblarRecurso(tipo) {
        const contenedor = document.getElementById('contenedor-recurso');
        
        // Base de datos de estructuras (Siguiendo tu modelo de ayer)
        const recursos = {
            'juego-rimas': `
                <div class="bg-teal-600 p-6 text-white flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <span class="text-4xl">🎤</span>
                        <div>
                            <h2 class="text-2xl font-black uppercase italic">Rimas Piuranas PRO</h2>
                            <p class="text-[10px] opacity-80 uppercase font-bold tracking-widest">Digital Interactivo</p>
                        </div>
                    </div>
                </div>
                <div class="p-8">
                    <div class="bg-teal-50 border border-teal-200 rounded-3xl p-10 text-center">
                        <p class="text-xs font-bold text-teal-600 mb-4 uppercase italic">Conciencia Fonológica - Nivel Esperado</p>
                        <div class="text-9xl mb-6">🐦</div>
                        <h3 class="text-3xl font-black text-slate-800 mb-4">El CHILALO construye su...</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="alert('¡Correcto!')" class="p-4 bg-white border-2 border-teal-500 rounded-2xl font-bold hover:bg-teal-500 hover:text-white transition-all text-xl">🏠 NIDO</button>
                            <button class="p-4 bg-white border-2 border-slate-200 rounded-2xl font-bold hover:border-teal-500 transition-all text-xl">🚗 CARRO</button>
                        </div>
                    </div>
                </div>
            `,
            'juego-puzzle': `
                <div class="bg-indigo-700 p-6 text-white flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <span class="text-4xl">🧩</span>
                        <div>
                            <h2 class="text-2xl font-black uppercase italic">Puzzle de Encastre Lógico</h2>
                            <p class="text-[10px] opacity-80 uppercase font-bold tracking-widest">Desafío Cognitivo - Nivel Destacado</p>
                        </div>
                    </div>
                </div>
                <div class="p-8 flex flex-col items-center">
                    <div class="w-64 h-64 border-4 border-dashed border-slate-200 rounded-[3rem] flex items-center justify-center text-slate-100 text-8xl mb-10">⭐</div>
                    <div class="flex gap-4">
                        <div class="w-32 h-32 bg-white shadow-xl rounded-2xl flex items-center justify-center text-6xl cursor-move border border-slate-100">⭐</div>
                    </div>
                    <p class="mt-8 text-xs font-bold text-slate-400">ARRASTRA LA PIEZA A SU SILUETA</p>
                </div>
            `
        };

        if (recursos[tipo]) {
            contenedor.innerHTML = recursos[tipo];
        }
    }
</script>
