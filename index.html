<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIAX - Sistema de Progresión Pedagógica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #e2e8f0; position: sticky; top: 0; height: 100vh; }
        .card-recurso { background: white; border-radius: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        
        /* Estilos de Puzzle */
        .puzzle-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 300px; height: 300px; background: #f1f5f9; border-radius: 1rem; padding: 10px; position: relative; }
        .slot { border: 2px dashed #cbd5e1; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; background: white; }
        .piece { width: 130px; height: 130px; cursor: grab; display: flex; align-items: center; justify-content: center; font-size: 3rem; background: white; border-radius: 0.5rem; shadow: lg; border: 1px solid #e2e8f0; z-index: 10; touch-action: none; }
        .dropzone-active { background: #d1fae5 !important; border-color: #10b981 !important; }
        
        @media print { .no-print { display: none !important; } .sidebar { display: none; } body { background: white; padding: 0; } .card-recurso { box-shadow: none; border: 1px solid #eee; margin: 0; width: 100%; } }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar p-6 flex flex-col gap-6 no-print">
        <div class="flex items-center gap-2 mb-4">
            <div class="bg-blue-900 text-white px-3 py-1 rounded-lg font-black italic">LIAX</div>
            <span class="text-[10px] font-bold text-blue-600 tracking-widest uppercase">Piura Pro</span>
        </div>
        <div class="space-y-2">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Aula: Rayitos A</h3>
            <div class="p-3 rounded-xl bg-rose-50 border border-rose-100 text-[11px] font-bold text-rose-700">⚠️ Apoyo: 7 Alumnos</div>
            <div class="p-3 rounded-xl bg-teal-50 border border-teal-100 text-[11px] font-bold text-teal-700">✅ Esperado: 15 Alumnos</div>
        </div>
    </aside>

    <main class="flex-1 p-8">
        
        <header class="flex justify-between items-center mb-10 no-print bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="text-sm font-bold text-slate-500">Selector de Recursos Secuenciales</div>
            <div class="flex gap-4">
                <div class="relative group">
                    <button class="bg-blue-900 text-white px-6 py-2.5 rounded-xl text-xs font-black shadow-lg">
                        SELECCIONAR ACTIVIDAD ▼
                    </button>
                    <div class="absolute right-0 mt-2 w-64 bg-white border border-slate-200 rounded-2xl shadow-2xl hidden group-hover:block z-50 overflow-hidden">
                        <button onclick="iniciarPuzzle(1)" class="w-full text-left p-4 text-xs hover:bg-indigo-50 border-b flex gap-3"><span>🧩</span> <strong>Puzzle de 4 Piezas</strong></button>
                        <button onclick="iniciarRima(1)" class="w-full text-left p-4 text-xs hover:bg-teal-50 border-b flex gap-3"><span>🎤</span> <strong>Tarjetas de Rimas</strong></button>
                        <button onclick="generarFichaMaestra()" class="w-full text-left p-4 text-xs hover:bg-rose-50 flex gap-3"><span>📄</span> <strong>Ficha Completa (Imprimir)</strong></button>
                    </div>
                </div>
                <button onclick="window.print()" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl text-xs font-black">IMPRIMIR</button>
            </div>
        </header>

        <div id="escenario" class="mx-auto max-w-4xl">
            <div class="p-20 text-center bg-white rounded-[3rem] border-4 border-dashed border-slate-100 text-slate-300 font-bold italic">
                Carga un recurso para comenzar la secuencia...
            </div>
        </div>
    </main>

    <script>
        const escenario = document.getElementById('escenario');
        let piezasEncajadas = 0;

        // --- LÓGICA DE PUZZLE ---
        function iniciarPuzzle(nivel) {
            piezasEncajadas = 0;
            const iconos = nivel === 1 ? ['🥭', '🌊', '🐦', '☀️'] : ['🦀', '🌴', '🐟', '⛵'];
            
            escenario.innerHTML = `
                <div class="card-recurso p-12 text-center animate-in fade-in zoom-in duration-300">
                    <h2 class="text-2xl font-black text-indigo-900 mb-2 uppercase italic">Puzzle Lógico - Nivel ${nivel}</h2>
                    <p class="text-sm text-slate-400 mb-8 font-bold italic uppercase">Arrastra las 4 piezas para completar el cuadro</p>
                    
                    <div class="flex flex-col md:flex-row gap-12 items-center justify-center">
                        <div class="puzzle-grid" id="puzzle-target">
                            <div class="slot" data-slot="0"></div><div class="slot" data-slot="1"></div>
                            <div class="slot" data-slot="2"></div><div class="slot" data-slot="3"></div>
                        </div>
                        
                        <div class="flex flex-wrap md:flex-col gap-4" id="piezas-container">
                            ${iconos.map((ico, i) => `<div class="piece draggable shadow-xl" data-id="${i}">${ico}</div>`).join('')}
                        </div>
                    </div>
                    <div id="btn-next-puzzle" class="mt-10 hidden">
                        <button onclick="iniciarPuzzle(${nivel + 1})" class="bg-green-500 text-white px-10 py-4 rounded-full font-black shadow-xl hover:bg-green-600">¡LOGRADO! HACER OTRO PUZZLE →</button>
                    </div>
                </div>`;
            initInteractPuzzle();
        }

        function initInteractPuzzle() {
            interact('.draggable').draggable({
                listeners: { move(event) {
                    const t = event.target;
                    const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                    t.style.transform = `translate(${x}px, ${y}px)`;
                    t.setAttribute('data-x', x); t.setAttribute('data-y', y);
                }}
            });

            interact('.slot').dropzone({
                accept: '.draggable', overlap: 0.6,
                ondragenter: e => e.target.classList.add('dropzone-active'),
                ondragleave: e => e.target.classList.remove('dropzone-active'),
                ondrop: e => {
                    const p = e.relatedTarget;
                    const s = e.target;
                    if(p.getAttribute('data-id') === s.getAttribute('data-slot')) {
                        s.innerHTML = p.innerHTML;
                        s.classList.remove('dropzone-active');
                        s.classList.add('bg-green-50', 'border-green-500');
                        p.style.display = 'none';
                        piezasEncajadas++;
                        if(piezasEncajadas === 4) document.getElementById('btn-next-puzzle').classList.remove('hidden');
                    }
                }
            });
        }

        // --- LÓGICA DE RIMAS ---
        function iniciarRima(n) {
            const rimas = [
                {q: "MANGO", a: "FANDANGO", ico: "🥭"},
                {q: "CHILALO", a: "PALO", ico: "🐦"},
                {q: "MAR", a: "JUGAR", ico: "🌊"}
            ];
            const r = rimas[n-1] || rimas[0];
            
            escenario.innerHTML = `
                <div class="card-recurso p-12 text-center bg-white border-4 border-teal-500">
                    <span class="text-xs font-black text-teal-600 uppercase tracking-widest">Tarjeta de Rima #${n}</span>
                    <div class="text-9xl my-8">${r.ico}</div>
                    <h3 class="text-3xl font-black text-slate-800 mb-8 uppercase italic underline decoration-teal-300">¿Qué rima con ${r.q}?</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <button onclick="checkRima(true, ${n})" class="p-6 bg-slate-50 border-2 border-slate-200 rounded-3xl text-xl font-bold hover:bg-teal-500 hover:text-white transition-all">${r.a}</button>
                        <button onclick="alert('¡Inténtalo de nuevo!')" class="p-6 bg-slate-50 border-2 border-slate-200 rounded-3xl text-xl font-bold">PIZZA</button>
                    </div>
                    <div id="next-rima" class="mt-8 hidden">
                        <button onclick="iniciarRima(${n+1})" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold">SIGUIENTE RIMA →</button>
                    </div>
                </div>`;
        }

        function checkRima(win, n) {
            if(win) {
                alert("¡Genial!");
                document.getElementById('next-rima').classList.remove('hidden');
            }
        }

        // --- GENERACIÓN DE FICHA MAESTRA (IMPRIMIBLE) ---
        function generarFichaMaestra() {
            escenario.innerHTML = `
                <div class="card-recurso bg-white border border-slate-300">
                    <div class="bg-blue-800 p-8 text-white flex justify-between items-center">
                        <h2 class="text-3xl font-black italic">FICHA MAESTRA LIAX</h2>
                        <div class="text-right text-[10px] uppercase font-bold tracking-widest">Contenido: 4 Puzzles + 6 Rimas</div>
                    </div>
                    
                    <div class="p-8 space-y-10">
                        <div>
                            <h4 class="bg-indigo-100 text-indigo-800 p-2 text-xs font-black uppercase mb-6 rounded-lg italic">🧩 Bloque 1: Recortables de Razonamiento (16 piezas)</h4>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                ${[1,2,3,4].map(i => `
                                    <div class="border-2 border-dashed border-slate-200 p-2 rounded-xl text-center">
                                        <div class="grid grid-cols-2 gap-1 mb-2">
                                            <div class="h-10 bg-slate-50 border border-slate-100"></div><div class="h-10 bg-slate-50 border border-slate-100"></div>
                                            <div class="h-10 bg-slate-50 border border-slate-100"></div><div class="h-10 bg-slate-50 border border-slate-100"></div>
                                        </div>
                                        <span class="text-[8px] font-bold text-slate-400">PUZZLE #${i}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div>
                            <h4 class="bg-teal-100 text-teal-800 p-2 text-xs font-black uppercase mb-6 rounded-lg italic">🎤 Bloque 2: Conciencia Fonológica Piurana (6 Tarjetas)</h4>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                                ${['Chilalo', 'Mango', 'Algarrobo', 'Paita', 'Sol', 'Mar'].map(item => `
                                    <div class="border-2 border-teal-500 rounded-2xl p-4 text-center">
                                        <div class="h-20 bg-slate-50 mb-3 flex items-center justify-center text-4xl">🖼️</div>
                                        <p class="text-[10px] font-black uppercase">${item}</p>
                                        <div class="mt-2 h-4 border-b border-slate-200"></div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
