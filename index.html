<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LIAX GENERATOR PRO - Full Content</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; }
        .canvas { background: white; color: #1e293b; min-height: 80vh; border-radius: 2rem; }
        .print-only { display: none; }
        @media print { .no-print { display: none; } .print-only { display: block; } .canvas { box-shadow: none; border: none; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <aside class="no-print space-y-6">
            <div class="bg-blue-600 p-6 rounded-3xl shadow-2xl">
                <h2 class="text-2xl font-black italic">LIAX PRO</h2>
                <p class="text-[10px] uppercase tracking-widest opacity-70">Motor de Generación 2026</p>
            </div>

            <div class="bg-slate-800 p-6 rounded-3xl space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Estudiante / Edad</label>
                    <select id="edad" class="w-full bg-slate-700 p-3 rounded-xl mt-1 text-sm font-bold outline-none">
                        <option value="5">Rayitos A (5 años) - Inicial</option>
                        <option value="17">Promoción (17 años) - Secundaria</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Nivel de Logro (INDI)</label>
                    <select id="logro" class="w-full bg-slate-700 p-3 rounded-xl mt-1 text-sm font-bold outline-none border-l-4 border-rose-500">
                        <option value="apoyo">⚠️ Zona de Apoyo (Descendido)</option>
                        <option value="destacado">🌟 Logro Destacado</option>
                    </select>
                </div>

                <button onclick="generar()" class="w-full bg-white text-blue-900 py-4 rounded-2xl font-black hover:bg-blue-400 hover:text-white transition-all shadow-xl">
                    GENERAR RECURSO YA
                </button>
            </div>
        </aside>

        <main class="lg:col-span-3 canvas p-8 shadow-2xl" id="display">
            <div class="flex flex-col items-center justify-center h-full text-slate-300 italic">
                <p>Configura los parámetros y presiona "GENERAR RECURSO YA"</p>
            </div>
        </main>
    </div>

    <script>
        function generar() {
            const edad = document.getElementById('edad').value;
            const logro = document.getElementById('logro').value;
            const display = document.getElementById('display');

            if (edad === "5") {
                // GENERACIÓN PARA 5 AÑOS (PIURA)
                display.innerHTML = `
                    <div class="border-8 border-teal-500 rounded-[3rem] overflow-hidden bg-white">
                        <div class="bg-teal-600 p-8 text-white flex justify-between items-center">
                            <div><h2 class="text-4xl font-black italic uppercase">LIAX JUNIOR</h2><p>COMUNICACIÓN • PIURA</p></div>
                            <span class="text-6xl">🎨</span>
                        </div>
                        <div class="p-10 space-y-10">
                            <div class="bg-rose-50 p-6 rounded-3xl border-2 border-rose-200">
                                <h3 class="font-black text-rose-700 uppercase mb-4">📍 ZONA DE APOYO: Conciencia Fonológica</h3>
                                <div class="grid grid-cols-2 gap-8 items-center">
                                    <div class="text-center">
                                        <div class="text-9xl">🐦</div>
                                        <p class="text-2xl font-black tracking-widest mt-4">chi - LA - lo</p>
                                    </div>
                                    <div class="space-y-4">
                                        <p class="font-bold text-slate-700 italic">"El chilalo del algarrobo, no le tiene miedo al lobo."</p>
                                        <p class="text-sm bg-white p-4 rounded-xl shadow-sm"><strong>Instrucción:</strong> Zeus y Thiago deben palmear cada sílaba mientras pintan el ave.</p>
                                    </div>
                                </div>
                            </div>
                            <div class="grid grid-cols-3 gap-4">
                                ${['Mango', 'Paita', 'Sol'].map(item => `<div class="border-4 border-dashed border-slate-200 h-32 rounded-2xl flex items-center justify-center text-slate-200 font-bold uppercase">${item}</div>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // GENERACIÓN PARA 17 AÑOS (SECUNDARIA)
                display.innerHTML = `
                    <div class="border-8 border-slate-900 rounded-3xl overflow-hidden bg-white">
                        <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
                            <div><h2 class="text-3xl font-black italic uppercase">LIAX ACADEMY</h2><p>ANÁLISIS CRÍTICO • NIVEL SUPERIOR</p></div>
                            <span class="text-5xl">🖋️</span>
                        </div>
                        <div class="p-10 space-y-8">
                            <div class="border-l-8 border-blue-600 p-6 bg-blue-50 rounded-r-2xl">
                                <h3 class="font-black text-blue-900 uppercase mb-2">Desafío: Geopolítica de los Recursos en el Siglo XXI</h3>
                                <p class="text-sm text-slate-600 leading-relaxed">Analice el impacto socioeconómico de la desalinización de agua en la costa norte peruana frente al estrés hídrico global. Elabore una hipótesis argumentativa de 500 palabras.</p>
                            </div>
                            <div class="grid grid-cols-2 gap-6">
                                <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200">
                                    <p class="text-xs font-black text-slate-400 uppercase mb-3 underline">Rúbrica (INDI Destacado)</p>
                                    <ul class="text-[11px] space-y-2 text-slate-600">
                                        <li>• Coherencia sistémica en la propuesta.</li>
                                        <li>• Uso de fuentes académicas citadas.</li>
                                        <li>• Análisis de variables multicausales.</li>
                                    </ul>
                                </div>
                                <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200">
                                    <p class="text-xs font-black text-slate-400 uppercase mb-3 underline">Recursos de Apoyo</p>
                                    <button class="w-full bg-slate-800 text-white p-2 rounded text-[10px] mb-2 uppercase">Ver Gráfico de Estrés Hídrico</button>
                                    <button class="w-full bg-slate-800 text-white p-2 rounded text-[10px] uppercase">Descargar Paper UNP</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
