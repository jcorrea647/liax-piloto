<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recurso Pedagógico - LIAX Editorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { liaxBlue: '#005088', liaxTeal: '#11caa0' },
                    fontFamily: { montserrat: ['Montserrat', 'sans-serif'], opensans:['Open Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f1f5f9; }
        .a4-page {
            width: 210mm; min-height: 297mm; padding: 15mm;
            margin: 20px auto; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        @media print {
            body { background: white; }
            .a4-page { margin: 0; box-shadow: none; width: 210mm; height: 297mm; page-break-after: always; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="font-opensans">

    <div class="fixed bottom-6 right-6 no-print">
        <button onclick="window.print()" class="bg-liaxTeal text-white font-montserrat font-extrabold py-3 px-6 rounded-full shadow-lg hover:scale-105 transition-transform">
            🖨️ IMPRIMIR RECURSO
        </button>
    </div>

    <div class="a4-page">
        <header class="border-b-4 border-liaxTeal pb-4 mb-6">
            <h1 class="font-montserrat font-extrabold text-3xl text-liaxBlue uppercase">Lista de Cotejo</h1>
            <p class="text-slate-500 font-bold">LIAX Editorial - Material de Apoyo</p>
        </header>

        <section class="mt-8">
            <table class="w-full border-collapse border-2 border-liaxBlue">
                <thead class="bg-liaxBlue text-white uppercase text-xs font-montserrat">
                    <tr>
                        <th class="p-3 border-2 border-liaxBlue">N°</th>
                        <th class="p-3 border-2 border-liaxBlue text-left">Apellidos y Nombres</th>
                        <th class="p-3 border-2 border-liaxBlue">Criterio 1</th>
                        <th class="p-3 border-2 border-liaxBlue">Criterio 2</th>
                    </tr>
                </thead>
                <tbody class="text-sm font-semibold">
                    <tr>
                        <td class="p-2 border-2 border-liaxBlue text-center">1</td>
                        <td class="p-2 border-2 border-liaxBlue">Ejemplo: Castillo, Luis</td>
                        <td class="p-2 border-2 border-liaxBlue text-center">☐</td>
                        <td class="p-2 border-2 border-liaxBlue text-center">☐</td>
                    </tr>
                    <tr class="bg-slate-50">
                        <td class="p-2 border-2 border-liaxBlue text-center">2</td>
                        <td class="p-2 border-2 border-liaxBlue">Ejemplo: Mendoza, Elena</td>
                        <td class="p-2 border-2 border-liaxBlue text-center">☐</td>
                        <td class="p-2 border-2 border-liaxBlue text-center">☐</td>
                    </tr>
                </tbody>
            </table>
        </section>
        
        <footer class="mt-10 text-center text-xs text-slate-400 font-bold italic">
            "Innovación educativa para cada aula" - LIAX 2026
        </footer>
    </div>

</body>
</html>
