<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .a4-page { width: 210mm; min-height: 297mm; padding: 15mm; margin: 10px auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        @media print { .no-print { display: none; } .a4-page { margin: 0; } }
    </style>
</head>
<body class="bg-slate-200">
    <div class="a4-page" id="contenido">
        </div>

    <script>
        // 1. Capturar lo que el usuario eligió en la página anterior
        const params = new URLSearchParams(window.location.search);
        const logro = params.get('logro') || 'esperado';
        const tipo = params.get('tipo') || 'juego';

        const container = document.getElementById('contenido');

        // 2. Base de datos de contenidos pedagógicos
        const contenidos = {
            descendido: {
                juego: "CIRCUITO BÁSICO: Gateo dirigido y equilibrio sobre línea ancha.",
                ficha: "Trazo grueso de líneas rectas y círculos grandes.",
                color: "border-red-500",
                emoji: "🆘"
            },
            esperado: {
                juego: "CIRCUITO INTERMEDIO: Salto de obstáculos bajos y carrera de relevos.",
                ficha: "Recorte de figuras geométricas y trazo de letras.",
                color: "border-teal-500",
                emoji: "✅"
            },
            destacado: {
                juego: "CIRCUITO AVANZADO: Coordinación óculo-manual con pelotas y equilibrio en un pie (5 seg).",
                ficha: "Laberintos complejos y escritura de nombres.",
                color: "border-blue-900",
                emoji: "🌟"
            }
        };

        const data = contenidos[logro];

        // 3. Dibujar el recurso según la elección
        container.innerHTML = `
            <div class="border-b-4 ${data.color} pb-4 mb-6">
                <h1 class="text-3xl font-black text-slate-800 italic">LIAX RECURSOS</h1>
                <p class="text-sm font-bold text-slate-500 uppercase">Nivel: Rayitos (5 años) | Estado: ${logro.toUpperCase()}</p>
            </div>

            <div class="bg-slate-50 p-6 rounded-xl border-2 border-dashed ${data.color} mb-8">
                <h2 class="text-2xl font-bold mb-4">${data.emoji} RECURSO: ${tipo.toUpperCase()}</h2>
                <p class="text-lg text-slate-700 font-medium">${data[tipo]}</p>
            </div>

            <table class="w-full border-collapse border border-slate-300">
                <tr class="bg-slate-800 text-white text-xs uppercase">
                    <th class="p-2 border">Alumno</th>
                    <th class="p-2 border">Observación Pedagógica</th>
                </tr>
                <tr><td class="p-2 border font-bold">Zeus Abad</td><td class="p-2 border italic text-slate-400 text-xs">Anotar aquí progreso...</td></tr>
                <tr class="bg-slate-50"><td class="p-2 border font-bold">Thayza Acaro</td><td class="p-2 border italic text-slate-400 text-xs">Anotar aquí progreso...</td></tr>
                <tr><td class="p-2 border font-bold">Hansel Estrada</td><td class="p-2 border italic text-slate-400 text-xs">Anotar aquí progreso...</td></tr>
            </table>

            <div class="mt-20 no-print">
                <button onclick="window.print()" class="bg-blue-900 text-white px-8 py-3 rounded-full font-bold">🖨️ IMPRIMIR ESTE RECURSO</button>
            </div>
        `;
    </script>
</body>
</html>
