<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIAX PREMIUM - Recursos Pedagógicos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .puzzle-piece { cursor: grab; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .puzzle-piece:active { cursor: grabbing; scale: 1.1; }
    </style>
</head>
<body class="bg-indigo-950 min-h-screen text-slate-100 font-sans">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="flex justify-between items-center mb-8 bg-white/10 p-4 rounded-2xl backdrop-blur-md">
            <div>
                <h1 id="resource-title" class="text-3xl font-black text-teal-400 uppercase tracking-tighter">Cargando Recurso...</h1>
                <p id="resource-subtitle" class="text-xs font-bold text-slate-300">LIAX EDITORIAL • RAYITOS A</p>
            </div>
            <button onclick="location.href='index.html'" class="bg-red-500/20 hover:bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold transition-all">Volver al Panel</button>
        </div>

        <div id="main-stage" class="bg-white rounded-[3rem] p-8 shadow-2xl min-h-[600px] text-slate-800 relative">
            </div>

        <div class="mt-8 bg-black/20 p-6 rounded-2xl no-print border border-white/5">
            <h3 class="text-teal-400 font-black text-sm mb-4 uppercase">Evaluación en tiempo real</h3>
            <div id="student-grid" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const logro = params.get('logro') || 'esperado';
        const tipo = params.get('tipo') || 'juego';
        
        const stage = document.getElementById('main-stage');
        const title = document.getElementById('resource-title');
        const grid = document.getElementById('student-grid');
        const alumnos = ["Zeus Abad", "Thayza Acaro", "Hansel Estrada", "Luis Imán", "Rebeca Jimenez", "Caleb Lopez", "Vianca Mayo", "Yocelin Ogoña"];

        // LÓGICA DE GENERACIÓN DE RECURSOS
        function init() {
            renderStudentGrid();
            
            if (tipo === 'juego' && logro === 'destacado') renderPuzzle();
            else if (tipo === 'juego' && logro === 'descendido') renderMemoria();
            else renderRimas();
        }

        // --- RECURSO 1: TARJETAS DE RIMAS (COMUNICACIÓN) ---
        function renderRimas() {
            title.innerText = "Tarjetas de Rimas Magnéticas";
            stage.innerHTML = `
                <div class="text-center mb-8"><span class="bg-amber-100 text-amber-700 px-4 py-1 rounded-full font-bold text-sm">NIVEL COMUNICACIÓN</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 h-full">
                    <div class="bg-slate-100 p-8 rounded-3xl border-4 border-teal-500 flex flex-col items-center justify-center">
                        <div class="text-8xl mb-4">🍎</div>
                        <p class="text-4xl font-black uppercase text-teal-800 font-serif tracking-widest">MANZANA</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div onclick="checkRhyme(true)" class="bg-white border-2 border-slate-200 p-6 rounded-3xl hover:border-teal-500 cursor-pointer flex flex-col items-center">
                            <span class="text-6xl mb-2">🔔</span><p class="font-bold">CAMPANA</p>
                        </div>
                        <div onclick="checkRhyme(false)" class="bg-white border-2 border-slate-200 p-6 rounded-3xl hover:border-teal-500 cursor-pointer flex flex-col items-center">
                            <span class="text-6xl mb-2">🚗</span><p class="font-bold">CARRO</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- RECURSO 2: PUZZLE DE FORMAS (DESTACADO) ---
        function renderPuzzle() {
            title.innerText = "Desafío de Encastre Lógico";
            stage.innerHTML = `
                <div class="text-center mb-6 text-slate-400 font-bold uppercase text-xs">Arrastra la pieza a su sombra correcta</div>
                <div class="flex justify-around items-center h-96">
                    <div class="puzzle-piece text-9xl" draggable="true">⭐</div>
                    <div class="w-40 h-40 border-8 border-dashed border-slate-200 rounded-full flex items-center justify-center text-slate-100 text-6xl">⭐</div>
                </div>
            `;
        }

        // --- RECURSO 3: MEMORIA PSICOMOTRIZ (DESCENDIDO) ---
        function renderMemoria() {
            title.innerText = "Memoria de Movimientos";
            const icons = ['🦒', '🦒', '🐸', '🐸', '🦀', '🦀'];
            icons.sort(() => Math.random() - 0.5);
            
            stage.innerHTML = `
                <div class="grid grid-cols-3 gap-4 max-w-lg mx-auto">
                    ${icons.map(icon => `
                        <div onclick="this.classList.toggle('flipped')" class="card-inner w-full h-32 relative cursor-pointer">
                            <div class="absolute inset-0 bg-teal-500 rounded-2xl flex items-center justify-center text-white text-4xl font-bold">?</div>
                            <div class="absolute inset-0 bg-white border-4 border-teal-500 rounded-2xl flex items-center justify-center text-6xl" style="backface-visibility: hidden; transform: rotateY(180deg);">${icon}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderStudentGrid() {
            alumnos.forEach(name => {
                grid.innerHTML += `
                    <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center border border-white/5">
                        <span class="text-[10px] font-medium">${name}</span>
                        <div class="flex gap-1">
                            <div class="w-2 h-2 rounded-full bg-slate-600"></div>
                        </div>
                    </div>
                `;
            });
        }

        function checkRhyme(isCorrect) {
            alert(isCorrect ? "¡Excelente! Riman igual." : "¡Casi! Intenta otra vez.");
        }

        init();
    </script>
</body>
</html>
