<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recurso LIAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .a4-page { width: 210mm; min-height: 297mm; margin: 20px auto; background: white; padding: 15mm; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        @media print { .no-print { display: none; } .a4-page { margin: 0; box-shadow: none; } }
    </style>
</head>
<body class="bg-slate-100">
    <div class="fixed bottom-6 right-6 no-print">
        <button onclick="window.print()" class="bg-teal-600 text-white px-6 py-3 rounded-full font-bold shadow-lg">IMPRIMIR</button>
    </div>
    <div class="a4-page">
        <h1 class="text-3xl font-bold text-blue-900 border-b-4 border-teal-500 pb-2">LISTA DE COTEJO LIAX</h1>
        <p class="text-gray-500 mt-2">Recurso generado exitosamente.</p>
        <table class="w-full mt-8 border-collapse border-2 border-blue-900">
            <thead class="bg-blue-900 text-white">
                <tr><th class="p-3 border">N°</th><th class="p-3 border text-left">Nombre del Alumno</th></tr>
            </thead>
            <tbody>
                <tr><td class="p-2 border text-center">1</td><td class="p-2 border">Alumno de ejemplo</td></tr>
            </tbody>
        </table>
    </div>
</body>
</html>
