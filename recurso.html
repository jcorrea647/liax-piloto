<!DOCTYPE html>

<head>

        body { font-family: 'Outfit', sans-serif; background: #0f172a; overflow-x: hidden; }

        .neo-card { background: #ffffff; border-radius: 2.5rem; box-shadow: 20px 20px 60px #080c16, -5px -5px 20px #1e293b; }
        .interactive-element { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .interactive-element:hover { transform: translateY(-5px) scale(1.02); }
        .drop-zone-active { border-color: #2dd4bf; background: rgba(45, 212, 191, 0.1); }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .scanning { animation: pulse-soft 2s infinite; }
    </style>
</head>

                <div>
                    <h1 class="text-xl font-black tracking-tight">LIAX <span class="text-teal-400 font-light">CORE</span></h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-[0.3em]">Advanced Learning Systems 2026</p>
                </div>
            </div>
            <div id="status-bar" class="flex gap-3">
                </div>
        </header>

        <main id="app-canvas" class="neo-card min-h-[700px] p-8 text-slate-800 relative overflow-hidden">

        </footer>

            logro: params.get('logro') || 'esperado',

            alumnos: ["Zeus Abad", "Thayza Acaro", "Hansel Estrada", "Luis Imán", "Rebeca Jimenez", "Caleb Lopez", "Vianca Mayo"]
        };

        const canvas = document.getElementById('app-canvas');
        const statusBar = document.getElementById('status-bar');

        function init() {
            document.getElementById('tag-logro').innerText = config.logro.toUpperCase();
            const selector = document.getElementById('alumno-selector');
            config.alumnos.forEach(a => selector.innerHTML += `<option>${a}</option>`);

            // RUTA DE RECURSOS DE AVANZADA
            if (config.tipo === 'juego') {
                if (config.logro === 'destacado') renderNeuroPuzzle();
                else if (config.logro === 'descendido') renderSensorimotor();
                else renderLogicCircuit();
            } else {
                renderFichaInteligente();
            }
        }
