<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LIAX Advanced Resource</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drop-zone { border: 6px dashed #cbd5e1; border-radius: 3rem; min-height: 250px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .drag-item { cursor: grab; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); transition: 0.3s; }
        .drag-item:active { cursor: grabbing; scale: 1.2; }
        .rhyme-card { transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .rhyme-card:hover { transform: translateY(-10px) rotate(2deg); }
    </style>
</head>
<body class="bg-slate-100 p-8">
    <div id="app" class="max-w-5xl mx-auto bg-white rounded-[4rem] shadow-2xl overflow-hidden min-h-[80vh] flex flex-col">
        </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const logro = params.get('logro');
        const tipo = params.get('tipo');
        const app = document.getElementById('app');

        // LOGICA DE RECURSOS
        if (logro === 'destacado') {
            // JUEGO DE PUZZLE LÓGICO
            app.innerHTML = `
                <div class="bg-teal-600 p-8 text-white flex justify-between items-center">
                    <h2 class="text-3xl font-black italic uppercase">Desafío Puzzle LIAX</h2>
                    <span class="bg-white/20 px-4 py-1 rounded-full text-xs font-bold">NIVEL: AVANZADO</span>
                </div>
                <div class="p-12 grid grid-cols-1 md:grid-cols-2 gap-12">
                    <div class="drop-zone bg-slate-50" ondragover="event.preventDefault()">
                        <div class="text-slate-300 font-black text-8xl opacity-20">?</div>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="drag-item text-8xl text-center bg-white p-6 rounded-3xl shadow-xl">🧩</div>
                        <div class="drag-item text-8xl text-center bg-white p-6 rounded-3xl shadow-xl">🔺</div>
                        <div class="drag-item text-8xl text-center bg-white p-6 rounded-3xl shadow-xl">🟣</div>
                        <div class="drag-item text-8xl text-center bg-white p-6 rounded-3xl shadow-xl">⭐</div>
                    </div>
                </div>
            `;
        } else if (logro === 'esperado') {
            // TARJETAS DE RIMAS
            app.innerHTML = `
                <div class="bg-orange-500 p-8 text-white flex justify-between items-center">
                    <h2 class="text-3xl font-black italic uppercase">Laboratorio de Rimas</h2>
                    <span class="bg-white/20 px-4 py-1 rounded-full text-xs font-bold">AREA: COMUNICACIÓN</span>
                </div>
                <div class="p-12 text-center">
                    <p class="text-slate-400 font-bold mb-8 uppercase tracking-widest">¿Qué palabra rima con el dibujo principal?</p>
                    <div class="flex flex-col items-center gap-8">
                        <div class="text-9xl bg-slate-50 w-64 h-64 flex items-center justify-center rounded-[3rem] shadow-inner border-4 border-orange-100">🐱</div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full">
                            <div class="rhyme-card bg-white p-8 rounded-3xl shadow-lg border-2 border-slate-100 text-6xl" onclick="alert('¡GATO rima con ZAPATO!')">👞</div>
                            <div class="rhyme-card bg-white p-8 rounded-3xl shadow-lg border-2 border-slate-100 text-6xl">🚗</div>
                            <div class="rhyme-card bg-white p-8 rounded-3xl shadow-lg border-2 border-slate-100 text-6xl">🍦</div>
                            <div class="rhyme-card bg-white p-8 rounded-3xl shadow-lg border-2 border-slate-100 text-6xl" onclick="alert('¡GATO rima con PATO!')">🦆</div>
                        </div>
                    </div>
                </div>
            `;
        } else {
            // MEMORIA SENSORIAL
            app.innerHTML = `
                <div class="bg-rose-500 p-8 text-white flex justify-between items-center">
                    <h2 class="text-3xl font-black italic uppercase">Gimnasio Mental</h2>
                    <span class="bg-white/20 px-4 py-1 rounded-full text-xs font-bold">NIVEL: REFUERZO</span>
                </div>
                <div class="p-12 grid grid-cols-3 md:grid-cols-4 gap-4">
                    ${Array(8).fill('?').map(i => `
                        <div class="h-40 bg-rose-50 rounded-3xl border-4 border-rose-100 flex items-center justify-center text-4xl font-black text-rose-300 cursor-pointer hover:bg-white transition-all">?</div>
                    `).join('')}
                </div>
            `;
        }
    </script>
</body>
</html>
